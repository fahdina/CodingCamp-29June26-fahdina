<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h3> Productivity Dashboard</h3>
        <h1 id="greeting">Hello!</h1>
        <p id="dateTime"></p>
        <input type="text" id="userName" placeholder="Enter your name">
        <button id="saveName">Save Name</button>
        <button id="themeBtn">🌙 Dark Mode</button>
    </header>

    <main>

        <section class="card">
            <h2>🍅 Focus Timer</h2>
            <h1 id="timer">25:00</h1>
            <button id="startBtn" class="start">▶ Start</button>
            <button id="stopBtn" class="stop">⏸ Stop</button>
            <button id="resetBtn" class="reset">🔄 Reset</button>
        </section>

        <section class="card">
            <h2>📝 To-Do List</h2>

            <input type="text" id="taskInput" placeholder="New task">
            <button id="addTask">Add</button>

            <ul id="taskList"></ul>
        </section>

        <section class="card">
            <h2>🔗 Quick Links</h2>

            <input type="text" id="linkName" placeholder="Website Name">
            <input type="url" id="linkURL" placeholder="https://example.com">

            <button id="addLink">Add Link</button>

            <div id="links"></div>
        </section>

    </main>

    <script src="js/script.js"></script>
<footer>
    Made with by Fahdina
</footer>
</body>
</html>
